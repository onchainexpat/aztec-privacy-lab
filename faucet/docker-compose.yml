# docker compose up -d
#
# Provide TESTNET_SECRET / SALT / SIGNING via an `.env` file in this directory
# (see .env.example). The compose file deliberately doesn't read them from the
# host env so you don't leak them into other containers' environments.

services:
  faucet:
    build:
      context: .
      dockerfile: Dockerfile
    image: aztec-privacy-lab-faucet:latest
    container_name: aztec-faucet
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 8095
      DATA_DIR: /data
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      MINT_AMOUNT: ${MINT_AMOUNT:-10000}
      MINT_COOLDOWN_SECONDS: ${MINT_COOLDOWN_SECONDS:-3600}
    ports:
      - "127.0.0.1:8095:8095"
    volumes:
      - ./data:/data
    # Belt-and-suspenders isolation. Faucet runs as a non-root user inside,
    # the host volume binds only /data, all caps dropped, no new privs.
    read_only: true
    tmpfs:
      - /tmp:size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8095/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 180s
    mem_limit: 2g
    cpus: 1.5
